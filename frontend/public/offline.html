<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - PPDB Online</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      
      .container {
        background: white;
        border-radius: 16px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        max-width: 500px;
        width: 100%;
      }
      
      .icon {
        font-size: 64px;
        margin-bottom: 20px;
      }
      
      h1 {
        color: #1a202c;
        font-size: 28px;
        margin-bottom: 12px;
      }
      
      p {
        color: #718096;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 24px;
      }
      
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #fed7d7;
        color: #c53030;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 24px;
      }
      
      button {
        background: #4299e1;
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      button:hover {
        background: #3182ce;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(66, 153, 225, 0.4);
      }
      
      .retry-icon {
        display: inline-block;
        animation: spin 2s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>Anda Offline</h1>
      <div class="status">
        <span class="retry-icon">🔄</span>
        Tidak ada koneksi internet
      </div>
      <p>
        Maaf, Anda sedang tidak terhubung ke internet. Beberapa fitur mungkin tidak tersedia.
        Silakan periksa koneksi Anda dan coba lagi.
      </p>
      <button onclick="window.location.reload()">
        🔄 Coba Lagi
      </button>
    </div>
    
    <script>
      // Auto-reload when connection is restored
      window.addEventListener('online', () => {
        window.location.reload();
      });
      
      // Check connection status on load
      if (navigator.onLine) {
        window.location.reload();
      }
    </script>
  </body>
</html>
